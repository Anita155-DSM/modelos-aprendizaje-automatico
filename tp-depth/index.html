<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Depth - Estimación de Profundidad 3D</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/depth-estimation"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            margin-top: 2rem;
        }
        h1 { margin-bottom: 5px; }
        #status { color: #f1c40f; font-weight: bold; margin-bottom: 20px; text-align: center;}
        
        video { display: none; }
        
        canvas {
            border: 4px solid #34495e;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>AR Portrait Depth (TensorFlow)</h1>
    <p id="status">Cargando dependencias (MediaPipe + Depth) y solicitando cámara...</p>

    <video id="webcam" autoplay playsinline width="640" height="480"></video>
    <canvas id="output" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 }
            });
            video.srcObject = stream;

            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        async function main() {
            await setupCamera();
            video.play();

            // Configurar y cargar el modelo de Profundidad
            const model = depthEstimation.SupportedModels.ARPortraitDepth;
            const estimator = await depthEstimation.createEstimator(model);

            statusText.innerText = "¡Modelo funcionando! Generando mapa de profundidad 3D...";
            statusText.style.color = "#2ecc71";

            async function procesarFrame() {
                // Calcular la profundidad
                const config = { minDepth: 0, maxDepth: 1 };
                const depthMap = await estimator.estimateDepth(video, config);
                
                // Convertir los datos a una imagen visible
                const depthImageSource = await depthMap.toCanvasImageSource();
                
                // Dibujar el mapa en el lienzo
                ctx.drawImage(depthImageSource, 0, 0, canvas.width, canvas.height);

                requestAnimationFrame(procesarFrame);
            }

            procesarFrame();
        }

        main();
    </script>
</body>
</html>
