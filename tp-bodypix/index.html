<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP BodyPix - Segmentación Alternativa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            margin-top: 2rem;
        }
        h1 { margin-bottom: 5px; }
        #status { color: #f1c40f; font-weight: bold; margin-bottom: 20px; }
        
        video { display: none; }
        
        canvas {
            border: 4px solid #34495e;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>BodyPix (TensorFlow)</h1>
    <p id="status">Cargando el modelo BodyPix y solicitando cámara...</p>

    <video id="webcam" autoplay playsinline width="640" height="480"></video>
    <canvas id="output" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const statusText = document.getElementById('status');

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 }
            });
            video.srcObject = stream;

            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    resolve(video);
                };
            });
        }

        async function main() {
            await setupCamera();
            video.play();

            // Acá está la principal diferencia: Cargamos la red neuronal de BodyPix
            const net = await bodyPix.load({
                architecture: 'MobileNetV1',
                outputStride: 16,
                multiplier: 0.75,
                quantBytes: 2
            });

            statusText.innerText = "¡BodyPix funcionando! Reemplazando fondo...";
            statusText.style.color = "#2ecc71";

            async function procesarFrame() {
                // Segmentar a la persona usando BodyPix
                const segmentation = await net.segmentPerson(video);

                // Configurar colores idénticos al proyecto anterior para comparar igual
                const foregroundColor = {r: 0, g: 0, b: 0, a: 0};
                const backgroundColor = {r: 0, g: 255, b: 0, a: 255};

                // Crear la máscara
                const mask = bodyPix.toMask(segmentation, foregroundColor, backgroundColor);

                // Dibujar en el canvas
                const opacity = 1;
                const maskBlurAmount = 3;
                const flipHorizontal = false;

                bodyPix.drawMask(canvas, video, mask, opacity, maskBlurAmount, flipHorizontal);

                requestAnimationFrame(procesarFrame);
            }

            procesarFrame();
        }

        main();
    </script>
</body>
</html>
